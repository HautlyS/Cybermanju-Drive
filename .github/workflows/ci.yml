name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 1
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Rust: Lint & Test ─────────────────────────────────────────────
  rust-check:
    name: Rust Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (for Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            pkg-config \
            build-essential \
            libssl-dev

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt -- --check

      - name: Run Clippy
        working-directory: src-tauri
        run: cargo clippy -- -W clippy::all -D warnings

      - name: Run tests
        working-directory: src-tauri
        run: cargo test --no-fail-fast

  # ─── Docker: Build Image ──────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: rust-check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: cybermanju-drive:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image exists
        run: docker images cybermanju-drive:latest

  # ─── WASM: Build for Web ─────────────────────────────────────────
  wasm-build:
    name: Build WASM (Web)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Build WASM
        run: npm run build:wasm

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-wasm
          path: dist-wasm/
          retention-days: 7

  # ─── Windows: Build Desktop ──────────────────────────────────────
  windows-build:
    name: Build Windows
    runs-on: windows-latest
    needs: rust-check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: src-tauri/target/release/bundle/**/*
          retention-days: 7

  # ─── Linux: Build .deb, .AppImage & .rpm ──────────────────────────
  linux-build:
    name: Build Linux (deb+AppImage+rpm)
    runs-on: ubuntu-latest
    needs: rust-check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (for Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            pkg-config \
            build-essential \
            libssl-dev

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 7

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          retention-days: 7

      - name: Upload RPM package
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux-rpm
          path: src-tauri/target/release/bundle/rpm/*.rpm
          retention-days: 7

  # ─── Linux: Build RPM ────────────────────────────────────────────
  rpm-build:
    name: Build Linux (RPM)
    runs-on: ubuntu-latest
    needs: [rust-check, linux-build]
    steps:
      - name: Download RPM from linux-build
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: dist-linux-rpm
          path: rpm-out

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-rpm
          path: rpm-out/*.rpm
          retention-days: 7

  # ─── Linux: Build Flatpak ────────────────────────────────────────
  flatpak-build:
    name: Build Linux (Flatpak)
    runs-on: ubuntu-latest
    needs: [rust-check, linux-build]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Debian package
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: dist-linux-deb
          path: artifacts

      - name: Install Flatpak
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install GNOME runtime and SDK
        run: |
          sudo flatpak install -y --noninteractive flathub org.gnome.Platform//47 org.gnome.Sdk//47

      - name: Build Flatpak bundle
        run: |
          flatpak-builder --force-clean --repo=repo build-dir src-tauri/flatpak/com.cybermanju.drive.yml
          flatpak build-bundle repo cybermanju-drive.flatpak com.cybermanju.drive

      - name: Upload Flatpak artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-flatpak
          path: cybermanju-drive.flatpak
          retention-days: 7

  # ─── Linux: Build Arch Package ────────────────────────────────────
  arch-build:
    name: Build Linux (Arch/CachyOS)
    runs-on: ubuntu-latest
    needs: [rust-check, linux-build]
    container:
      image: archlinux:latest
    steps:
      - name: Install base dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            git \
            webkit2gtk-4.1 \
            gtk3 \
            libayatana-appindicator \
            librsvg \
            libsoup3 \
            pkg-config \
            openssl \
            curl \
            sudo

      - name: Create build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix ownership
        run: chown -R builder:builder $GITHUB_WORKSPACE

      - name: Install Rust
        run: |
          sudo -u builder bash -c 'curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y'
          sudo -u builder bash -c 'source $HOME/.cargo/env && rustup default stable'

      - name: Install Node.js
        run: pacman -S --noconfirm nodejs npm

      - name: Build Arch package
        run: |
          sudo -u builder bash -c "
            export HOME=/home/builder
            export PATH=\$HOME/.cargo/bin:\$PATH
            cd $GITHUB_WORKSPACE
            npm ci
            npm run tauri build
          "

      - name: Collect artifacts
        run: |
          chown -R builder:builder $GITHUB_WORKSPACE
          sudo -u builder bash -c '
            mkdir -p dist-arch
            cp src-tauri/target/release/bundle/deb/*.deb dist-arch/ 2>/dev/null || true
            cp src-tauri/target/release/bundle/appimage/*.AppImage dist-arch/ 2>/dev/null || true
          '

      - name: Upload Arch build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-arch
          path: dist-arch/
          retention-days: 7

  # ─── Android: Build APK ──────────────────────────────────────────
  android-build:
    name: Build Android
    runs-on: ubuntu-latest
    needs: rust-check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Rust targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Install Android NDK
        run: sdkmanager "ndk;26.1.10909125"

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Initialize Android project
        run: npm run tauri android init

      - name: Build Android APK
        run: npm run tauri android build
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-android
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 7

  # ─── Deploy: GitHub Pages ─────────────────────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: wasm-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-wasm
          path: dist-wasm/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-wasm/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
