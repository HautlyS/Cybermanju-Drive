name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Rust: Lint & Test (gate) ─────────────────────────────────────
  rust-check:
    name: Rust Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            pkg-config \
            build-essential \
            libssl-dev

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt -- --check

      - name: Run Clippy
        working-directory: src-tauri
        run: cargo clippy -- -W clippy::all -D warnings

      - name: Run tests
        working-directory: src-tauri
        run: cargo test --no-fail-fast

  # ─── WASM: Build for Web ─────────────────────────────────────────
  wasm-build:
    name: Build WASM (Web)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Build WASM
        run: npm run build:wasm

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-wasm
          path: dist-wasm/
          retention-days: 30

  # ─── Windows: Build Desktop ──────────────────────────────────────
  windows-build:
    name: Build Windows
    runs-on: windows-latest
    needs: rust-check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/*/*.msi
            src-tauri/target/release/bundle/*/*.exe
          retention-days: 30

  # ─── Linux: Build Desktop (deb + AppImage) ───────────────────────
  linux-build:
    name: Build Linux (deb+AppImage)
    runs-on: ubuntu-latest
    needs: rust-check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            pkg-config \
            build-essential \
            libssl-dev \
            libfuse2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/*/*.deb
            src-tauri/target/release/bundle/*/*.AppImage
          retention-days: 30

  # ─── macOS: Build Desktop (dmg + app) ────────────────────────────
  macos-build:
    name: Build macOS
    runs-on: macos-latest
    needs: rust-check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/*/*.dmg
            src-tauri/target/release/bundle/*/*.app
          retention-days: 30

  # ─── Android: Build APK ──────────────────────────────────────────
  android-build:
    name: Build Android
    runs-on: ubuntu-latest
    needs: rust-check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125"
          sdkmanager --licenses <<< "y"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Rust targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Initialize Android project
        run: npx tauri android init

      - name: Build Android APK
        run: npx tauri android build
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 30

  # ─── Docker: Build Image ──────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: rust-check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: cybermanju-drive:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image exists
        run: docker images cybermanju-drive:latest

  # ─── Create GitHub Release ───────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - rust-check
      - wasm-build
      - windows-build
      - linux-build
      - macos-build
      - android-build
      - docker-build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: false

      - name: List downloaded artifacts
        run: find artifacts/ -type f | head -100

      - name: Generate release notes
        id: notes
        run: |
          # Get the previous tag
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1 || echo "")
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          
          echo "## What's Changed" > release_notes.md
          echo "" >> release_notes.md
          
          if [ -n "$PREV_TAG" ]; then
            echo "### Changes since $PREV_TAG" >> release_notes.md
            echo "" >> release_notes.md
            git log --pretty=format:"- %s (%h)" "$PREV_TAG".."$CURRENT_TAG" >> release_notes.md
          else
            echo "### Initial Release" >> release_notes.md
            echo "" >> release_notes.md
            git log --pretty=format:"- %s (%h)" >> release_notes.md
          fi
          
          echo "" >> release_notes.md
          echo "" >> release_notes.md
          echo "## Downloads" >> release_notes.md
          echo "" >> release_notes.md
          echo "| Platform | File |" >> release_notes.md
          echo "|----------|------|" >> release_notes.md
          echo "| Windows | \`dist-windows.zip\` (MSI/NSIS installers) |" >> release_notes.md
          echo "| Linux | \`dist-linux.zip\` (deb + AppImage) |" >> release_notes.md
          echo "| macOS | \`dist-macos.zip\` (DMG) |" >> release_notes.md
          echo "| Android | \`dist-android.zip\` (APK) |" >> release_notes.md
          echo "| Web (WASM) | \`dist-wasm.zip\` (static files for any web server) |" >> release_notes.md
          echo "| Docker | \`docker pull hautlythird211/cybermanju-drive:latest\` |" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Docker" >> release_notes.md
          echo "" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "docker run -d -p 3456:3456 -v /data:/data hautlythird211/cybermanju-drive:latest" >> release_notes.md
          echo '```' >> release_notes.md
          echo "" >> release_notes.md
          echo "## Installation" >> release_notes.md
          echo "" >> release_notes.md
          echo "- **Windows**: Download and run the \`.exe\` installer" >> release_notes.md
          echo "- **Linux**: Install the \`.deb\` package or run the \`.AppImage\`" >> release_notes.md
          echo "- **macOS**: Open the \`.dmg\` and drag to Applications" >> release_notes.md
          echo "- **Android**: Enable unknown sources, install the \`.apk\`" >> release_notes.md
          echo "- **Web**: Extract \`.zip\` and serve with any static file server" >> release_notes.md

      - name: Package artifacts
        run: |
          mkdir -p packages
          
          # Package Windows artifacts
          if [ -d "artifacts/release-windows" ]; then
            cd artifacts/release-windows
            zip -r ../../packages/dist-windows.zip . || true
            cd ../..
          fi
          
          # Package Linux artifacts
          if [ -d "artifacts/release-linux" ]; then
            cd artifacts/release-linux
            zip -r ../../packages/dist-linux.zip . || true
            cd ../..
          fi
          
          # Package macOS artifacts
          if [ -d "artifacts/release-macos" ]; then
            cd artifacts/release-macos
            zip -r ../../packages/dist-macos.zip . || true
            cd ../..
          fi
          
          # Package Android artifacts
          if [ -d "artifacts/release-android" ]; then
            cd artifacts/release-android
            zip -r ../../packages/dist-android.zip . || true
            cd ../..
          fi
          
          # Package WASM artifacts
          if [ -d "artifacts/dist-wasm" ]; then
            cd artifacts/dist-wasm
            zip -r ../../packages/dist-wasm.zip . || true
            cd ../..
          fi
          
          # List all packages
          ls -la packages/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Cybermanju Drive ${{ github.ref_name }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: packages/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
